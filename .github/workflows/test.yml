name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # Opt into Node.js 24 ahead of the June 2026 default flip. Silences the
  # "Node.js 20 actions are deprecated" warning emitted by actions/checkout
  # and conda-incubator/setup-miniconda.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        # Use a login shell so `conda activate` works in subsequent steps.
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v4

      - name: Set up conda env (openalea3 + dependencies)
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: plant_sim
          # mamba is much faster than vanilla conda at solving openalea
          miniforge-version: latest
          use-mamba: true
          # Don't implicitly add the `defaults` channel; environment.yml
          # declares openalea3 + conda-forge explicitly.
          conda-remove-defaults: 'true'

      - name: Install package
        run: pip install -e .

      - name: Run pytest
        run: pytest -v

      - name: Cross-runtime parity (PCG + Seed.derive, Python vs JS)
        run: node --test viewer/test/parity.test.mjs
